<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SLABR.br — figurinhas e cards graduados</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Inter:wght@400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root{
 --vault:#0c0f13;--vault-2:#13171e;--vault-3:#1a1f28;
 --ice:#eef2f7;--mist:#97a1b0;--mist-dim:#586273;
 --champagne:#e7c47a;--champagne-dim:#c79a4e;
 --line:rgba(255,255,255,.07);--line-strong:rgba(255,255,255,.14);
 --ok:#4ade80;--bad:#f87171;--grass:#22c55e;
 --gem:linear-gradient(110deg,#6ee7d6,#a78bfa,#f0abfc,#fbbf24,#6ee7d6);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ice);min-height:100vh;-webkit-font-smoothing:antialiased;
 background:radial-gradient(1200px 620px at 70% -8%,rgba(120,140,180,.12),transparent 58%),radial-gradient(760px 420px at 12% 8%,rgba(231,196,122,.06),transparent 56%),var(--vault);background-attachment:fixed}
a{color:inherit;text-decoration:none}
.wrap{max-width:1120px;margin:0 auto;padding:0 24px}
.muted{color:var(--mist)} .mono{font-family:'Space Mono'}
@keyframes holo{to{background-position:200% 50%}}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
header{position:sticky;top:0;z-index:40;backdrop-filter:blur(16px);background:linear-gradient(to bottom,rgba(12,15,19,.94),rgba(12,15,19,.66));border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:center;gap:26px;height:66px}
.brand{display:flex;align-items:center;gap:10px;font-family:'Bricolage Grotesque';font-weight:800;font-size:19px;letter-spacing:-.02em}
.brand .mk{width:26px;height:26px;border-radius:7px;background:var(--gem);background-size:200% 200%;animation:holo 6s linear infinite;box-shadow:0 0 16px rgba(167,139,250,.4)}
nav.menu{display:flex;gap:22px}
nav.menu a{color:var(--mist);font-size:14px;font-weight:500;padding:4px 0;border-bottom:2px solid transparent;cursor:pointer}
nav.menu a:hover{color:var(--ice)} nav.menu a.on{color:var(--ice);border-bottom-color:var(--champagne)}
.authbtns{margin-left:auto;display:flex;align-items:center;gap:10px}
.lnk{font-size:14px;font-weight:500;color:var(--mist);padding:9px 12px;border-radius:9px;cursor:pointer}.lnk:hover{color:var(--ice)}
.cta{font-size:14px;font-weight:600;color:#10141a;background:var(--champagne);padding:10px 16px;border-radius:9px;border:none;cursor:pointer;transition:transform .12s}.cta:hover{transform:translateY(-1px)}
.cta.ghost{background:transparent;color:var(--ice);border:1px solid var(--line-strong)}
.userchip{display:flex;align-items:center;gap:9px;cursor:pointer;background:var(--vault-2);border:1px solid var(--line-strong);padding:6px 12px 6px 6px;border-radius:999px}
.userchip .uav{width:28px;height:28px;border-radius:50%;background:linear-gradient(145deg,#2a3340,#11151b);display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:13px;color:var(--champagne)}
.userchip span{font-size:13px;font-weight:600}
#app{animation:fade .35s ease;padding-bottom:10px}
.hero{display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center;padding:64px 0 46px}
.eyebrow{font-family:'Space Mono';font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--champagne);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.hero h1{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(38px,5.4vw,58px);line-height:1.0;letter-spacing:-.035em}
.hero h1 em{font-style:normal;background:var(--gem);background-size:200% 200%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:holo 7s linear infinite}
.hero p.sub{color:var(--mist);font-size:17px;line-height:1.55;margin:20px 0 26px;max-width:470px}
.heroctas{display:flex;gap:12px;flex-wrap:wrap}.heroctas .big{font-size:15px;padding:14px 22px}
.trustline{display:flex;gap:24px;margin-top:28px;flex-wrap:wrap}
.trustline div{font-size:13px;color:var(--mist)} .trustline b{font-family:'Bricolage Grotesque';font-weight:800;font-size:20px;color:var(--ice);display:block}
.stage{perspective:1300px;display:grid;place-items:center}
.fslab{--rx:0deg;--ry:0deg;--pos:50% 50%;--mx:50%;--my:50%;width:288px;border-radius:18px;padding:11px 11px 30px;position:relative;
 background:linear-gradient(160deg,rgba(243,245,248,.16),rgba(120,130,145,.07));border:1px solid var(--line-strong);
 transform:rotateX(var(--rx)) rotateY(var(--ry));transition:transform .15s ease;box-shadow:0 36px 70px rgba(0,0,0,.55)}
.fslab.rest{transition:transform 1s cubic-bezier(.2,.8,.2,1);animation:float 7s ease-in-out infinite}
@keyframes float{0%,100%{transform:rotateX(5deg) rotateY(-7deg)}50%{transform:rotateX(-3deg) rotateY(7deg)}}
.fslab .lab{display:flex;justify-content:space-between;align-items:center;padding:2px 5px 9px}
.fslab .br{font-family:'Bricolage Grotesque';font-weight:800;font-size:12px;color:var(--ice)}
.fslab .gr{font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:#10141a;padding:5px 11px;border-radius:7px;background:var(--gem);background-size:200% 200%;animation:holo 5s linear infinite;box-shadow:0 0 14px rgba(251,191,36,.5)}
.fslab .gr small{display:block;font-family:'Space Mono';font-size:6.5px;letter-spacing:.1em}
.fart{border-radius:11px;aspect-ratio:5/7;overflow:hidden;position:relative;border:1px solid rgba(0,0,0,.2)}
.fart .base{position:absolute;inset:0;background:linear-gradient(165deg,#0b3d1f,#06351b 55%,#04160c)}
.fart .base::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 26px,rgba(255,255,255,.045) 26px 52px),radial-gradient(60% 42% at 50% 78%,rgba(231,196,122,.3),transparent)}
.fart .num{position:absolute;inset:0;display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:80px;color:rgba(255,255,255,.92);text-shadow:0 3px 14px rgba(0,0,0,.5)}
.fart .nm{position:absolute;bottom:0;left:0;right:0;padding:12px;color:#fff;font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;background:linear-gradient(to top,rgba(0,0,0,.82),transparent);text-shadow:0 1px 3px #000}
.fart .nm small{display:block;font-family:Inter;font-weight:500;font-size:10px;opacity:.85;margin-top:2px}
.fart .holo{position:absolute;inset:0;mix-blend-mode:color-dodge;opacity:.5;background:repeating-linear-gradient(115deg,rgba(255,119,115,.4)0%,rgba(255,237,95,.4)12%,rgba(95,255,237,.4)24%,rgba(115,135,255,.4)36%,rgba(255,119,221,.4)48%,rgba(255,119,115,.4)60%);background-size:200% 200%;background-position:var(--pos)}
.fart .glare{position:absolute;inset:0;mix-blend-mode:overlay;opacity:.75;background:radial-gradient(circle at var(--mx) var(--my),rgba(255,255,255,.6),transparent 42%)}
.fslab .cert{font-family:'Space Mono';font-size:8px;color:var(--mist);text-align:center;padding-top:9px}
.sec{padding:30px 0}
.sec-h{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:16px;flex-wrap:wrap}
.sec-h h2{font-family:'Bricolage Grotesque';font-weight:800;font-size:26px;letter-spacing:-.02em}
.sec-h p{color:var(--mist);font-size:14px;margin-top:4px}
.sec-h a{font-size:13.5px;color:var(--champagne);font-weight:600;white-space:nowrap;cursor:pointer}
.feats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.feat{background:var(--vault-2);border:1px solid var(--line);border-radius:14px;padding:22px;transition:.2s}
.feat:hover{border-color:var(--line-strong);transform:translateY(-3px)}
.feat .ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:18px;background:rgba(231,196,122,.1);border:1px solid var(--line-strong);margin-bottom:14px}
.feat h3{font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;margin-bottom:6px}.feat p{font-size:13px;color:var(--mist);line-height:1.5}
.ad{border:1px dashed var(--line-strong);border-radius:14px;background:repeating-linear-gradient(135deg,rgba(255,255,255,.02) 0 12px,transparent 12px 24px),var(--vault-2);display:flex;align-items:center;justify-content:center;gap:12px;padding:26px;text-align:center}
.ad .tag{font-family:'Space Mono';font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mist-dim);border:1px solid var(--line);padding:4px 8px;border-radius:6px}
.ad .txt{color:var(--mist);font-size:13.5px} .ad.banner{min-height:96px}
footer{border-top:1px solid var(--line);margin-top:40px;padding:34px 0}
.foot{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;color:var(--mist-dim);font-size:13px}
.foot a{color:var(--mist);cursor:pointer}.foot a:hover{color:var(--ice)}
.searchbox{display:flex;gap:10px;max-width:560px;background:var(--vault-2);border:1px solid var(--line-strong);border-radius:14px;padding:8px}
.searchbox:focus-within{border-color:var(--champagne-dim)}
.searchbox input{flex:1;background:none;border:none;outline:none;color:var(--ice);font-family:'Space Mono';font-size:15px;padding:11px 13px}
.searchbox input::placeholder{color:var(--mist-dim)}
.searchbox button{background:var(--champagne);color:#10141a;border:none;border-radius:9px;padding:0 20px;font-weight:600;cursor:pointer}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.chip{font-family:'Space Mono';font-size:12px;color:var(--mist);background:var(--vault-2);border:1px solid var(--line);border-radius:8px;padding:7px 11px;cursor:pointer}
.chip:hover{color:var(--ice);border-color:var(--line-strong)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:20px}
.item{cursor:pointer;transition:transform .2s}.item:hover{transform:translateY(-4px)}
.illus{aspect-ratio:5/7;border-radius:13px;padding:9px;position:relative;overflow:hidden;border:2px solid rgba(255,255,255,.14);box-shadow:0 12px 28px rgba(0,0,0,.4)}
.illus .bg{position:absolute;inset:0}.illus .grain{position:absolute;inset:0;mix-blend-mode:overlay;opacity:.22;background-image:radial-gradient(circle at 30% 20%,rgba(255,255,255,.5),transparent 40%),radial-gradient(circle at 70% 80%,rgba(0,0,0,.5),transparent 45%)}
.illus .holo{position:absolute;inset:0;mix-blend-mode:color-dodge;opacity:0;background:repeating-linear-gradient(115deg,rgba(255,119,115,.4)0%,rgba(255,237,95,.4)12%,rgba(95,255,237,.4)24%,rgba(115,135,255,.4)36%,rgba(255,119,221,.4)48%,rgba(255,119,115,.4)60%);background-size:200% 200%}
.illus.rare .holo{opacity:.5;animation:holo 5s linear infinite}
.illus .nm{position:relative;z-index:2;font-family:'Bricolage Grotesque';font-weight:800;font-size:14px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.illus .emblem{position:absolute;inset:0;z-index:2;display:grid;place-items:center}.illus .emblem span{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:26px;color:rgba(255,255,255,.92);background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.35);text-shadow:0 1px 4px rgba(0,0,0,.5)}
.illus .pop{position:absolute;z-index:2;bottom:8px;left:8px;right:8px;display:flex;justify-content:flex-end}
.illus .popbadge{font-family:'Space Mono';font-size:9px;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.3);padding:3px 7px;border-radius:6px;color:#fff}
.illus .figlock{position:absolute;top:8px;left:8px;z-index:3;font-family:'Space Mono';font-size:9px;color:#fff;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.25);padding:3px 7px;border-radius:6px}
.cap{margin-top:8px}.cap .cn{font-weight:600;font-size:13.5px}.cap .cm{font-family:'Space Mono';font-size:10px;color:var(--mist);margin-top:2px}
.figmeta{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
.figmeta .pr{font-family:'Bricolage Grotesque';font-weight:800;font-size:15px}.figmeta .se{font-family:'Space Mono';font-size:10px;color:var(--mist)}
.two{display:grid;grid-template-columns:1fr 300px;gap:34px;align-items:start;padding-top:6px}
.section-h{display:flex;align-items:baseline;justify-content:space-between;margin:26px 0 14px}.section-h span{font-size:13px;color:var(--mist)}
.section-h h2{font-family:'Bricolage Grotesque';font-weight:800;letter-spacing:-.02em}
.back{font-family:'Space Mono';font-size:12px;color:var(--mist);cursor:pointer;margin-bottom:14px;display:inline-block}.back:hover{color:var(--ice)}
.det h2{font-size:26px;font-family:'Bricolage Grotesque';font-weight:800;letter-spacing:-.02em}.det .sub{color:var(--mist);font-size:14px;margin:6px 0 8px}
.vbadge{display:inline-block;font-family:'Space Mono';font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--champagne);border:1px solid var(--champagne-dim);background:rgba(231,196,122,.07);padding:4px 9px;border-radius:6px;margin-bottom:8px}
.status{display:flex;align-items:center;gap:10px;font-family:'Space Mono';font-size:13px;padding:12px 16px;border-radius:10px;margin-bottom:18px}
.status.ok{color:var(--ok);background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25)}
.status.bad{color:var(--bad);background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25)}
.status .dot{width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}
.offers{display:flex;flex-direction:column;gap:10px}
.offer{display:grid;grid-template-columns:42px 1fr auto auto;gap:13px;align-items:center;background:var(--vault-2);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
.offer:hover{border-color:var(--line-strong)}
.oslab{width:42px;height:58px;border-radius:6px;position:relative;overflow:hidden;border:1px solid rgba(0,0,0,.3)}
.oslab .g{position:absolute;top:3px;left:3px;font-family:'Bricolage Grotesque';font-weight:800;font-size:9px;color:#10141a;background:#e2e8f0;padding:1px 4px;border-radius:4px}
.oslab .g.gem{background:var(--gem);background-size:200% 200%;animation:holo 5s linear infinite}
.oinfo .gr{font-family:'Bricolage Grotesque';font-weight:800;font-size:15px}.oinfo .gr .gt{font-family:'Space Mono';font-size:8px;color:var(--champagne);margin-left:5px;letter-spacing:.06em}
.oinfo .se{font-size:12px;color:var(--mist);margin-top:3px}.oinfo .se a{color:var(--champagne-dim)}
.oinfo .ce{font-family:'Space Mono';font-size:9px;color:var(--mist-dim);margin-top:2px}
.op{text-align:right}.op .p{font-family:'Bricolage Grotesque';font-weight:800;font-size:16px}.op .s{font-family:'Space Mono';font-size:9px;color:var(--mist-dim)}
.add{background:var(--champagne);color:#10141a;border:none;border-radius:9px;padding:9px 13px;font-weight:600;font-size:12.5px;cursor:pointer}
.add.added{background:var(--vault-3);color:var(--ok);border:1px solid rgba(74,222,128,.3)}
.sectit{font-family:'Space Mono';font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--champagne);margin-bottom:10px}
.popbars{display:flex;flex-direction:column;gap:8px;background:var(--vault-2);border:1px solid var(--line);border-radius:11px;padding:14px 16px}
.pb{display:grid;grid-template-columns:54px 1fr 36px;align-items:center;gap:10px;font-family:'Space Mono';font-size:11px}
.pb .lab{color:var(--mist)}.pb .track{height:7px;background:var(--vault-3);border-radius:4px;overflow:hidden}.pb .fill{height:100%;background:var(--mist-dim);border-radius:4px}
.slab{border-radius:12px;background:linear-gradient(160deg,#f3f5f8,#d3d9e0);padding:9px 9px 11px;box-shadow:0 18px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.9)}
.slab-top{display:flex;align-items:center;justify-content:space-between;padding:4px 6px 8px}
.slab-brand{font-family:'Bricolage Grotesque';font-weight:800;font-size:12px;color:#10141a}
.grade{font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;padding:5px 9px;border-radius:7px;color:#10141a;background:#cfd6de;text-align:center}
.grade.gem{background:var(--gem);background-size:200% 200%;animation:holo 5s linear infinite;box-shadow:0 0 14px rgba(251,191,36,.5)}
.grade .lb{display:block;font-family:'Space Mono';font-size:6px;letter-spacing:.1em;margin-top:2px}
.window{border-radius:8px;aspect-ratio:5/7;overflow:hidden;position:relative;display:grid;place-items:center;border:1px solid rgba(0,0,0,.15)}
.window .nm{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:9px;color:#fff;font-family:'Bricolage Grotesque';font-weight:800;font-size:13px;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);text-shadow:0 1px 3px rgba(0,0,0,.6)}
.window .nm small{display:block;font-family:Inter;font-weight:500;font-size:9px;opacity:.85;margin-top:2px}
.window .em{position:absolute;inset:0;display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:30px;color:rgba(255,255,255,.9);z-index:1}
.scan-note{font-family:'Space Mono';font-size:8px;color:#5b6472;text-align:center;padding:8px 4px 2px}
.cert-layout{display:grid;grid-template-columns:200px 1fr;gap:28px;align-items:start}
.subgrades{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:16px}
.sg{background:var(--vault-2);padding:11px 12px}.sg .k{font-family:'Space Mono';font-size:9px;text-transform:uppercase;color:var(--mist-dim);margin-bottom:5px}.sg .v{font-family:'Bricolage Grotesque';font-weight:800;font-size:18px}
.meta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:11px;overflow:hidden}
.mc{background:var(--vault-2);padding:11px 15px}.mc .k{font-family:'Space Mono';font-size:9px;text-transform:uppercase;color:var(--mist-dim);margin-bottom:4px}.mc .v{font-size:14px;font-weight:600}.mc .v.gold{font-family:'Bricolage Grotesque';font-weight:800;color:var(--champagne);font-size:16px}.mc .v a{color:var(--champagne)}
.hero-c{display:flex;gap:22px;align-items:flex-start;flex-wrap:wrap;padding:30px 0 6px}
.avatar{width:84px;height:84px;border-radius:20px;background:linear-gradient(145deg,#2a3340,#11151b);border:1px solid var(--line-strong);display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:32px;color:var(--champagne);flex-shrink:0}
.hero-c h2{font-family:'Bricolage Grotesque';font-weight:800;letter-spacing:-.02em}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:999px;border:1px solid var(--line-strong);background:var(--vault-2);cursor:pointer}
.badge.rank{border-color:var(--champagne-dim);color:var(--champagne);background:rgba(231,196,122,.07)}
.section-h h2{font-size:18px}
.toggle{display:flex;align-items:center;justify-content:space-between;margin-top:9px;background:var(--vault-2);border:1px solid var(--line);border-radius:10px;padding:8px 11px}
.toggle .tlbl{font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px}.toggle .tlbl .d{width:8px;height:8px;border-radius:50%}
.toggle .tlbl.pub .d{background:var(--grass);box-shadow:0 0 7px var(--grass)}.toggle .tlbl.pub{color:var(--ice)}
.toggle .tlbl.prv .d{background:var(--mist-dim)}.toggle .tlbl.prv{color:var(--mist)}
.sw{width:38px;height:22px;border-radius:999px;background:var(--vault-3);border:1px solid var(--line-strong);position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--mist);transition:.2s}
.sw.on{background:rgba(34,197,94,.25);border-color:var(--grass)}.sw.on::after{transform:translateX(16px);background:var(--grass)}
.addtile{aspect-ratio:5/7;border:1.5px dashed var(--line-strong);border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--mist);transition:.2s}.addtile:hover{border-color:var(--champagne-dim);color:var(--ice)}
.addtile .plus{font-size:28px;font-family:'Bricolage Grotesque'}
.authpage{max-width:440px;margin:46px auto;padding-bottom:50px}
.card-box{background:var(--vault-2);border:1px solid var(--line-strong);border-radius:18px;padding:30px}
.card-box h1{font-family:'Bricolage Grotesque';font-weight:800;font-size:25px;letter-spacing:-.02em;margin-bottom:6px}

function initTilt(){
 const card=$('#fslab');if(!card)return;const stage=card.closest('.stage');
 function mv(e){const r=card.getBoundingClientRect();const x=((e.touches?e.touches[0].clientX:e.clientX)-r.left)/r.width;const y=((e.touches?e.touches[0].clientY:e.clientY)-r.top)/r.height;
  card.classList.remove('rest');card.style.setProperty('--ry',((x-.5)*22).toFixed(1)+'deg');card.style.setProperty('--rx',(-(y-.5)*22).toFixed(1)+'deg');
  card.style.setProperty('--pos',(x*100).toFixed(0)+'% '+(y*100).toFixed(0)+'%');card.style.setProperty('--mx',(x*100).toFixed(0)+'%');card.style.setProperty('--my',(y*100).toFixed(0)+'%');}
 function rs(){card.classList.add('rest');['--ry','--rx'].forEach(p=>card.style.setProperty(p,'0deg'));card.style.setProperty('--pos','50% 50%');card.style.setProperty('--mx','50%');card.style.setProperty('--my','50%');}
 stage.addEventListener('mousemove',mv);stage.addEventListener('mouseleave',rs);
 stage.addEventListener('touchmove',e=>{e.preventDefault();mv(e);},{passive:false});stage.addEventListener('touchend',rs);
}

function priceChartSVG(points){
 if(!points||!points.length) return '';
 const W=640,H=240,pl=56,pr=16,pt=14,pb=34,N=points.length;
 const vals=points.map(p=>p.v); const top=(Math.max(...vals)*1.12)||1;
 const X=i=>pl+(N<2?0:(i/(N-1))*(W-pl-pr));
 const Y=v=>pt+(1-(v/top))*(H-pt-pb);
 let grid='',ylab='';const steps=4;
 for(let s=0;s<=steps;s++){const gv=top*s/steps,gy=Y(gv);
  grid+=`<line x1="${pl}" y1="${gy.toFixed(1)}" x2="${W-pr}" y2="${gy.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`;
  ylab+=`<text x="${pl-9}" y="${(gy+3).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--mist-dim)" font-family="Space Mono">R$${Math.round(gv)}</text>`;}
 let xlab='';[0,Math.floor(N/4),Math.floor(N/2),Math.floor(3*N/4),N-1].forEach(i=>{
  const d=points[i].d.slice(5).split('-').reverse().join('/');
  xlab+=`<text x="${X(i).toFixed(1)}" y="${H-12}" text-anchor="middle" font-size="9" fill="var(--mist-dim)" font-family="Space Mono">${d}</text>`;});
 const line=points.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(p.v).toFixed(1)}`).join(' ');
 const area=`M${X(0).toFixed(1)},${Y(0).toFixed(1)} `+points.map((p,i)=>`L${X(i).toFixed(1)},${Y(p.v).toFixed(1)}`).join(' ')+` L${X(N-1).toFixed(1)},${Y(0).toFixed(1)} Z`;
 const dots=points.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="1.8" fill="var(--champagne)"/>`).join('');
 return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">${grid}<path d="${area}" fill="rgba(231,196,122,.08)"/><path d="${line}" fill="none" stroke="var(--champagne)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}${ylab}${xlab}</svg>`;
}

    <div class="muted" style="margin:4px 0 14px">${ME.city||'Brasil'} · ${d.n} cartas · ${d.public_n} públicas</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
     <a class="badge rank" href="#/colecionador/${ME.handle}">★ ver minha vitrine pública</a>
     <span class="badge">${brl(val)} em coleção</span>
     <span class="lnk" onclick="location.hash='#/logout'" style="border:1px solid var(--line);border-radius:999px">sair</span>
    </div></div>
  </div>
  <div class="section-h"><h2>Minhas cartas</h2><span>visibilidade · à venda · graduação</span></div>
  <div class="grid" id="myGrid"></div>
  ${reqsHtml}`;
 drawMyGrid(d.items);
}
function drawMyGrid(items){
 const g=$('#myGrid'); if(!g)return;
 g.innerHTML=items.map(it=>{const c=it.card;
   const badge=it.graded?('SLABR '+fmt(it.grade)):(it.condition||'crua');
   const qty=(it.qty&&it.qty>1)?(' ×'+it.qty):'';
   return `<div>
     <div onclick="location.hash='#/carta/${c.id}'" style="cursor:pointer">${thumb(c,it.scan,(it.public?'<div class="pop"><span class="popbadge">'+badge+'</span></div>':'<div class="figlock">🔒 privada</div>'))}</div>
     <div class="cap"><div class="cn">${c.name}${qty}</div><div class="cm">${it.value?brl(it.value):(it.graded?'graduada':it.condition||'—')}</div></div>
     <div class="toggle"><span class="tlbl ${it.public?'pub':'prv'}"><span class="d"></span>${it.public?'Pública':'Privada'}</span>
       <div class="sw vis ${it.public?'on':''}" data-cert="${it.cert}" data-pub="${it.public?1:0}"></div></div>
     <div class="toggle" style="margin-top:6px"><span class="tlbl ${it.forSale?'pub':'prv'}"><span class="d"></span>${it.forSale?'À venda':'Fora do mercado'}</span>
       <div class="sw sale ${it.forSale?'on':''}" data-cert="${it.cert}" data-sale="${it.forSale?1:0}"></div></div>
     ${it.graded?'<div class="grdtag">✓ graduada</div>':`<a class="grdbtn" href="#/graduacao/${it.cert}">Graduar pela TAG Grading</a>`}
   </div>`;}).join('') + `<div class="addtile" onclick="location.hash='#/adicionar'"><div class="plus">+</div><div style="font-size:13px">Adicionar carta</div></div>`;
 g.querySelectorAll('.sw.vis').forEach(sw=>sw.onclick=()=>toggleVis(sw));
 g.querySelectorAll('.sw.sale').forEach(sw=>sw.onclick=()=>toggleSale(sw));
}
async function toggleVis(sw){
 const cert=sw.dataset.cert,next=sw.dataset.pub==='1'?false:true;
 const r=await POST('/graded/'+encodeURIComponent(cert)+'/visibility',{public:next});
 if(r&&r.ok){const d=await J('/me/cards');drawMyGrid(d.items);toast(next?'Card agora é público — visível na vitrine.':'Card agora é privado — só você vê.');}
 else{toast('<span style="color:var(--bad)">'+((r&&r.error)||'falha ao atualizar')+'</span>');}
}
async function toggleSale(sw){
 const cert=sw.dataset.cert,next=sw.dataset.sale==='1'?false:true;
 const r=await POST('/graded/'+encodeURIComponent(cert)+'/sale',{forSale:next});
 if(r&&r.ok){const d=await J('/me/cards');drawMyGrid(d.items);toast(next?'Card agora está à venda — aparece no mercado.':'Card saiu do mercado.');}
 else{toast('<span style="color:var(--bad)">'+((r&&r.error)||'falha ao atualizar')+'</span>');}
}
const CHECK=[
 ['owner','Sou o proprietário desta carta e ela está em minha posse.'],
 ['authentic','A carta é <b>autêntica e original</b> (não é proxy, cópia ou reimpressão não-oficial).'],
 ['unaltered','A carta <b>não passou por restauro, recorte, colagem ou alteração</b>.'],
 ['clean','A carta está <b>limpa e seca</b>, sem fitas, adesivos ou resíduos.'],
 ['terms','Li e aceito os <b>prazos e a tabela de preços</b> do serviço de graduação.'],
 ['packaging','Vou embalar conforme as instruções (sleeve + toploader) antes de enviar.']
];
async function renderGradingRequest(cert){
 const d=await J('/me/cards'); if(!d||d.error){location.hash='#/login';return;}
 const it=(d.items||[]).find(x=>x.cert===cert);
 if(!it){$('#app').innerHTML='<span class="back" onclick="location.hash=\u0027#/espaco\u0027">← biblioteca</span><p class="muted" style="margin-top:14px">Carta não encontrada na sua biblioteca.</p>';return;}
 if(it.graded){$('#app').innerHTML='<span class="back" onclick="location.hash=\u0027#/espaco\u0027">← biblioteca</span><p class="muted" style="margin-top:14px">Essa carta já está graduada.</p>';return;}
 const c=it.card;
 const state={owner:false,authentic:false,unaltered:false,clean:false,terms:false,packaging:false};
 $('#app').innerHTML=`
  <span class="back" onclick="location.hash='#/espaco'">← biblioteca</span>
  <div style="padding:18px 0 6px"><div class="eyebrow">◆ Autenticação · ${PARTNER.name} (parceira)</div>
   <h1 style="font-family:Bricolage Grotesque;font-weight:800;font-size:28px;letter-spacing:-.02em">Enviar para autenticar e graduar</h1>
   <p class="muted" style="margin-top:6px">A autenticação e graduação são feitas pela <b>${PARTNER.name}</b>, nossa parceira no Brasil. Confira os dados, preencha o checklist e continue no site deles.</p></div>
  <div class="two" style="padding-top:14px"><div>
    <div class="sectit">Checklist obrigatório</div>
    <div id="chkList">${CHECK.map(([k,t])=>`<div class="chk" data-k="${k}"><div class="box"></div><div class="tx">${t}</div></div>`).join('')}</div>
    <div class="sec-form" style="margin-top:18px"><div class="sectit">Dados do envio</div>
      <div class="row2"><div><label>Valor declarado (R$, p/ seguro)</label><input type="number" id="grVal" min="0" step="10" value="${it.value||''}" placeholder="ex.: 500"></div>
      <div><label>Serviço</label><select id="grSvc"><option>Econômico</option><option selected>Padrão</option><option>Expresso</option></select></div></div>
      <label>Observações (opcional)</label><input id="grNotes" placeholder="algo que devemos saber sobre a carta"></div>
    <button class="btn" id="grSubmit" style="width:100%;opacity:.4;pointer-events:none">Continuar no site da ${PARTNER.name} →</button>
    <div class="hint">Registramos o pedido na sua biblioteca e abrimos o site da ${PARTNER.name} numa nova aba para você concluir a submissão.</div>
   </div>
   <div>
    <div class="sectit" style="text-align:center">Carta</div>
    <div style="max-width:220px;margin:0 auto">${illus(c)}</div>
    <div id="grAttrs" style="margin-top:10px"><div class="sectit">Dados da carta</div>${[['Nome',c.name],['Coleção',c.set],['Número','#'+c.num],['Estado atual',it.condition||'—']].map(a=>'<div class="attr"><span>'+a[0]+'</span><b>'+a[1]+'</b></div>').join('')}</div>
   </div>
  </div>`;
 function refresh(){const ok=CHECK.every(([k])=>state[k]) && (+$('#grVal').value>0);const b=$('#grSubmit');b.style.opacity=ok?1:.4;b.style.pointerEvents=ok?'auto':'none';}
 document.querySelectorAll('#chkList .chk').forEach(el=>el.onclick=()=>{const k=el.dataset.k;state[k]=!state[k];el.classList.toggle('on',state[k]);el.querySelector('.box').textContent=state[k]?'✓':'';refresh();});
 $('#grVal').oninput=refresh;
 $('#grSubmit').onclick=async()=>{
   const r=await POST('/grading-request',{cert,checklist:state,declared_value:+$('#grVal').value||0,service:$('#grSvc').value,notes:$('#grNotes').value});
   if(r&&r.ok){
     window.open(PARTNER.url,'_blank','noopener');
     $('#app').innerHTML=`<div class="confirm"><div class="eyebrow" style="justify-content:center">✓ Pedido registrado</div>
       <div class="proto">${r.protocol}</div>
       <p class="muted">Status: <b style="color:var(--champagne)">${r.status}</b></p>
       <p style="margin:14px 0;line-height:1.5">Abrimos o site da <b>${PARTNER.name}</b> numa nova aba para você concluir a submissão. Se não abriu, use o botão abaixo. Guarde o protocolo <b>${r.protocol}</b> — você acompanha o status na sua biblioteca.</p>
       <a class="btn" href="${PARTNER.url}" target="_blank" rel="noopener">Abrir o site da ${PARTNER.name} →</a>
       <div style="margin-top:12px"><a class="lnk" href="#/espaco">voltar à biblioteca</a></div></div>`;
     window.scrollTo(0,0);
   } else { toast('<span style="color:var(--bad)">'+((r&&r.error)||'falha ao enviar')+'</span>'); }
 };
}
$('#burger').onclick=()=>$('#mobilemenu').classList.toggle('open');
loadMe().then(route);
</script></body></html>
